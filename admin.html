<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Soraka Constella</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Painel Admin</h1>
            <div class="subtitle">Gerenciamento</div>
        </header>

        <div id="login-screen" class="admin-card">
            <h2 style="font-family: 'Emilys Candy'; margin-bottom: 20px;">Acesso</h2>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="login-email" placeholder="Seu e-mail">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login-password" placeholder="Sua senha">
            </div>
            <button class="admin-btn" id="btn-login">Entrar no Painel</button>
            <p id="login-error" style="color: #d9534f; margin-top: 15px; display: none; font-weight: 800;">Erro ao logar.</p>
        </div>

        <div id="dashboard-screen">
            <button class="admin-btn danger" id="btn-logout" style="width: auto; padding: 8px 20px; margin-bottom: 20px;">Sair</button>

            <div class="admin-card">
                <h2 style="font-family: 'Emilys Candy';">Promoção</h2>
                <div class="form-group">
                    <label>Desconto Global (%)</label>
                    <input type="number" id="global-discount" value="0">
                </div>
                <button class="admin-btn" id="btn-save-config">Salvar Desconto</button>
            </div>

            <div class="admin-card">
                <h2 style="font-family: 'Emilys Candy';">Categorias</h2>
                <div class="form-group">
                    <label>Nome da Categoria</label>
                    <input type="text" id="cat-nome" placeholder="Ex: Ovos, Trufas...">
                </div>
                <button class="admin-btn" id="btn-add-category">Adicionar</button>
                <div id="admin-category-list" style="margin-top: 20px;"></div>
            </div>

            <div class="admin-card">
                <h2 style="font-family: 'Emilys Candy';">Novo Produto</h2>
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="prod-nome">
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="prod-cat"></select>
                </div>
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="prod-preco" step="0.01">
                </div>
                <div class="form-group">
                    <label>URL da Imagem</label>
                    <input type="text" id="prod-img" placeholder="Cole o link da foto">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="prod-desc" rows="2"></textarea>
                </div>
                <button class="admin-btn" id="btn-add-product">Cadastrar Produto</button>
            </div>

            <div class="admin-card">
                <h2 style="font-family: 'Emilys Candy';">Cardápio Atual</h2>
                <div id="admin-product-list"></div>
            </div>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
