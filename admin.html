<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Soraka Constella</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Painel Admin</h1>
        </header>

        <div id="login-screen" class="admin-card">
            <div class="form-group"><label>E-mail</label><input type="email" id="login-email"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="login-password"></div>
            <button class="admin-btn" id="btn-login">Entrar</button>
        </div>

        <div id="dashboard-screen" style="display:none;">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="admin-btn danger" id="btn-logout">Sair</button>
                <a href="index.html" class="admin-btn" style="text-decoration:none; text-align:center;">Ver Site</a>
            </div>

            <div class="admin-card">
                <h2>Produtos</h2>
                <div id="form-prod-box">
                    <input type="hidden" id="edit-prod-id">
                    <div class="form-group"><label>Nome</label><input type="text" id="p-nome"></div>
                    <div class="form-group"><label>Categoria</label><select id="p-cat"></select></div>
                    <div class="form-group"><label>Preço</label><input type="number" id="p-preco" step="0.01"></div>
                    <div class="form-group"><label>Imagem (Link)</label><input type="text" id="p-img"></div>
                    <div class="form-group"><label>Descrição</label><textarea id="p-desc" rows="2"></textarea></div>
                    <div class="form-group" style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.3); padding:10px; border-radius:10px;">
                        <input type="checkbox" id="p-esgotado" style="width:20px; height:20px;">
                        <label for="p-esgotado" style="margin:0;">Esgotado?</label>
                    </div>
                    <button class="admin-btn success" id="btn-save-prod">Salvar</button>
                </div>
                <div id="list-produtos" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
