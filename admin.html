<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Soraka Constella</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Painel Admin</h1>
            <div class="subtitle">Soraka Constella</div>
        </header>

        <div id="login-screen" class="admin-card">
            <h2 style="font-family: 'Emilys Candy'; margin-bottom: 20px;">Acesso</h2>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="login-email" placeholder="admin@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login-password" placeholder="Sua senha">
            </div>
            <button class="admin-btn" id="btn-login">Entrar</button>
            <a href="index.html" style="display: block; margin-top: 20px; color: var(--text-color); font-weight: 800; text-decoration: none;">← Voltar para o Cardápio</a>
        </div>

        <div id="dashboard-screen" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <a href="index.html" style="color: var(--text-color); font-weight: 800; text-decoration: none;">← Ver Site</a>
                <button class="admin-btn danger" id="btn-logout" style="width: auto; padding: 8px 15px; margin-top: 0;">Sair</button>
            </div>

            <div class="admin-card">
                <h2 style="font-family: 'Emilys Candy';">Novo Produto</h2>
                <div class="form-group">
                    <label>Nome</label><input type="text" id="prod-nome">
                </div>
                <div class="form-group">
                    <label>Categoria</label><select id="prod-cat"></select>
                </div>
                <button class="admin-btn" id="btn-add-product">Cadastrar Produto</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay"><div class="modal-content admin-card"><h3>Confirma?</h3><button class="admin-btn danger" id="btn-confirm-delete">Excluir</button><button class="admin-btn" id="modal-cancel">Cancelar</button></div></div>
    <div id="success-modal" class="modal-overlay"><div class="modal-content admin-card"><h3>Sucesso!</h3><button class="admin-btn" id="btn-success-close">OK</button></div></div>

    <script type="module" src="admin.js"></script>
</body>
</html>
